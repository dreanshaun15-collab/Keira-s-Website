<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Melody's Magical World</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #ffb3d9 0%, #ff99cc 25%, #ff66b2 50%, #ff3399 75%, #cc0066 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating hearts animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ff69b4, transparent),
                radial-gradient(2px 2px at 40px 70px, #ff1493, transparent),
                radial-gradient(1px 1px at 90px 40px, #ff69b4, transparent),
                radial-gradient(1px 1px at 130px 80px, #ff1493, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s infinite linear;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-1000px) rotate(360deg); }
        }

        .header {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .logo {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ff69b4, #ff1493);
            border-radius: 50%;
            margin: 0 auto 10px;
            position: relative;
            animation: bounce 2s infinite;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
        }

        .logo::before {
            content: '🎀';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
        }

        .logo::after {
            content: 'My Melody';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ff69b4;
            font-size: 1.2em;
            font-weight: 700;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            position: relative;
            overflow: hidden;
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.6);
        }

        .nav-btn:active {
            transform: translateY(-1px);
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid #ff69b4;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-title {
            text-align: center;
            font-size: 2em;
            color: #ff1493;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        /* Memory Game */
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(45deg, #ff69b4, #ffb3d9);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            user-select: none;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
            background: linear-gradient(45deg, #fff, #ffe4e1);
        }

        .memory-card.matched {
            transform: scale(0.9);
            background: linear-gradient(45deg, #90ee90, #98fb98);
            cursor: default;
        }

        /* Whack-a-Mole */
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .mole-hole {
            aspect-ratio: 1;
            background: radial-gradient(circle, #8b4513, #654321);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.3);
        }

        .mole-hole:hover {
            transform: scale(1.05);
        }

        .mole-up {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: translateY(100%); }
            50% { transform: translateY(-20%); }
            100% { transform: translateY(0); }
        }

        /* Drawing Canvas */
        .drawing-area {
            border: 5px solid #ff69b4;
            border-radius: 20px;
            background: #fff;
            margin: 20px auto;
            display: block;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .score {
            font-size: 1.5em;
            font-weight: 700;
            color: #ff1493;
            text-align: center;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        /* Rainbow effect */
        .rainbow {
            animation: rainbow 3s infinite;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .memory-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
                max-width: 320px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"></div>
        <h1>My Melody's Magical World! 🌸💕</h1>
        <p class="subtitle">For my super special little sister! 🎀</p>
        <nav class="nav">
            <button class="nav-btn" onclick="showGame('memory')">Memory Game</button>
            <button class="nav-btn" onclick="showGame('whack')">Whack-a-Mole</button>
            <button class="nav-btn" onclick="showGame('draw')">Draw Time!</button>
            <button class="nav-btn rainbow" onclick="showAllGames()">All Games 🎮</button>
        </nav>
    </div>

    <div class="main-content">
        <!-- Memory Game -->
        <div id="memory-game" class="game-container hidden">
            <h2 class="game-title">🎀 My Melody Memory Match 🎀</h2>
            <div class="score" id="memory-score">Score: 0</div>
            <div class="memory-board" id="memory-board"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="nav-btn" onclick="newMemoryGame()">New Game</button>
            </div>
        </div>

        <!-- Whack-a-Mole -->
        <div id="whack-game" class="game-container hidden">
            <h2 class="game-title">🐰 Whack-a-Mole Bunny! 🐰</h2>
            <div class="score" id="whack-score">Score: 0 | Time: 30</div>
            <div class="mole-grid" id="mole-grid"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="nav-btn" onclick="startWhackGame()">Start Game (30s)</button>
            </div>
        </div>

        <!-- Drawing Game -->
        <div id="draw-game" class="game-container hidden">
            <h2 class="game-title">✨ Draw with My Melody! ✨</h2>
            <div class="controls">
                <button class="color-btn" style="background: #ff69b4;" onclick="setColor('#ff69b4')"></button>
                <button class="color-btn" style="background: #ff1493;" onclick="setColor('#ff1493')"></button>
                <button class="color-btn" style="background: #ffb3d9;" onclick="setColor('#ffb3d9')"></button>
                <button class="color-btn" style="background: #fff;" onclick="setColor('#fff')" title="Eraser"></button>
                <button class="nav-btn" onclick="clearCanvas()" style="margin-left: 20px;">Clear Canvas 🧹</button>
                <button class="nav-btn" onclick="downloadDrawing()">Download Drawing 💾</button>
            </div>
            <canvas id="drawing-canvas" class="drawing-area" width="600" height="400"></canvas>
        </div>
    </div>

    <script>
        let currentGame = '';
        let memoryScore = 0;
        let whackScore = 0;
        let whackTime = 30;
        let whackTimer;
        let drawingCtx;
        let currentColor = '#ff69b4';
        let isDrawing = false;

        // Show specific game
        function showGame(game) {
            document.querySelectorAll('.game-container').forEach(el => el.classList.add('hidden'));
            document.getElementById(game + '-game').classList.remove('hidden');
            currentGame = game;
        }

        // Show all games
        function showAllGames() {
            document.querySelectorAll('.game-container').forEach(el => el.classList.remove('hidden'));
        }

        // Memory Game
        const emojis = ['🎀', '🐰', '🌸', '💕', '⭐', '🍓', '🌈', '🧸'].flatMap(x => [x, x]);
        
        function newMemoryGame() {
            memoryScore = 0;
            document.getElementById('memory-score').textContent = 'Score: 0';
            const board = document.getElementById('memory-board');
            board.innerHTML = '';
            
            // Shuffle emojis
            const shuffled = emojis.sort(() => Math.random() - 0.5);
            
            shuffled.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        let flippedCards = [];
        function flipCard() {
            if (flippedCards.length >= 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return;
            
            this.classList.add('flipped');
            this.textContent = this.dataset.emoji;
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 1000);
            }
        }

        function checkMatch() {
            if (flippedCards[0].dataset.emoji === flippedCards[1].dataset.emoji) {
                flippedCards.forEach(card => card.classList.add('matched'));
                memoryScore += 10;
                document.getElementById('memory-score').textContent = `Score: ${memoryScore}`;
            } else {
                flippedCards.forEach(card => {
                    card.classList.remove('flipped');
                    card.textContent = '';
                });
            }
            flippedCards = [];
            
            // Check win
            if (document.querySelectorAll('.matched').length === emojis.length) {
                setTimeout(() => alert('🎉 You won! Perfect memory! 🎉'), 500);
            }
        }

        // Whack-a-Mole
        function startWhackGame() {
            whackScore = 0;
            whackTime = 30;
            document.getElementById('whack-score').textContent = `Score: 0 | Time: 30`;
            
            const grid = document.getElementById('mole-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'mole-hole';
                hole.dataset.index = i;
                hole.addEventListener('click', whackMole);
                grid.appendChild(hole);
            }
            
            whackTimer = setInterval(() => {
                whackTime--;
                document.getElementById('whack-score').textContent = `Score: ${whackScore} | Time: ${whackTime}`;
                if (whackTime <= 0) {
                    clearInterval(whackTimer);
                    alert(`🎉 Game Over! Final Score: ${whackScore} 🐰`);
                }
            }, 1000);
            
            moleInterval = setInterval(popMole, 800);
        }

        let moleInterval;
        function popMole() {
            document.querySelectorAll('.mole-up').forEach(hole => {
                hole.classList.remove('mole-up');
                hole.textContent = '';
            });
            
            const holes = document.querySelectorAll('.mole-hole');
            const randomHole = holes[Math.floor(Math.random() * holes.length)];
            randomHole.textContent = '🐰';
            randomHole.classList.add('mole-up');
        }

        function whackMole(e) {
            if (e.target.classList.contains('mole-up')) {
                whackScore += 10;
                e.target.textContent = '💥';
                e.target.classList.remove('mole-up');
                document.getElementById('whack-score').textContent = `Score: ${whackScore} | Time: ${whackTime}`;
                setTimeout(() => {
                    e.target.textContent = '';
                }, 200);
            }
        }

        // Drawing Canvas
        const canvas = document.getElementById('drawing-canvas');
        drawingCtx = canvas.getContext('2d');
        drawingCtx.lineWidth = 5;
        drawingCtx.lineCap = 'round';
        drawingCtx.lineJoin = 'round';

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            drawingCtx.lineTo(x, y);
            drawingCtx.stroke();
            drawingCtx.beginPath();
            drawingCtx.moveTo(x, y);
        }

        function setColor(color) {
            currentColor = color;
            drawingCtx.strokeStyle = color;
            if (color === '#fff') {
                drawingCtx.lineWidth = 20;
            } else {
                drawingCtx.lineWidth = 5;
            }
        }

        function clearCanvas() {
            drawingCtx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function downloadDrawing() {
            const link = document.createElement('a');
            link.download = 'my-melody-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
            drawingCtx.beginPath();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            drawingCtx.lineTo(x, y);
            drawingCtx.stroke();
            drawingCtx.beginPath();
            drawingCtx.moveTo(x, y);
        });

        // Initialize
        newMemoryGame();
    </script>
</body>
</html>
